version: 2

models:
  - name: dim_date
    description: "Date dimension (daily grain) for Jan 2024."
    columns:
      - name: date_key
        data_tests: [not_null, unique]

  - name: dim_zone
    description: "TLC taxi zone dimension."
    columns:
      - name: zone_id
        data_tests: [not_null, unique]

  - name: dim_vendor
    description: "Metering vendor dimension (seed)."
    columns:
      - name: vendor_id
        data_tests: [not_null, unique]

  - name: dim_payment_type
    description: "Payment type dimension (seed)."
    columns:
      - name: payment_type_id
        data_tests:
          - not_null
          - unique
          - accepted_values:
              arguments:
                values: [0, 1, 2, 3, 4, 5, 6]
                quote: false

  - name: dim_rate_code
    description: "Rate code dimension (seed)."
    columns:
      - name: rate_code_id
        data_tests: [not_null, unique]

  - name: fct_trips
    description: "Trip fact table, one row per cleaned yellow taxi trip (star schema gold)."
    columns:
      - name: trip_key
        description: "Surrogate key (hash of vendor, timestamps, locations, total)."
        data_tests: [not_null, unique]
      - name: pickup_date
        data_tests:
          - relationships:
              arguments: {to: ref('dim_date'), field: date_key}
      - name: vendor_id
        data_tests:
          - relationships:
              arguments: {to: ref('dim_vendor'), field: vendor_id}
      - name: payment_type_id
        data_tests:
          - relationships:
              arguments: {to: ref('dim_payment_type'), field: payment_type_id}
      - name: rate_code_id
        data_tests:
          - relationships:
              arguments: {to: ref('dim_rate_code'), field: rate_code_id}
      - name: pickup_location_id
        data_tests:
          - relationships:
              arguments: {to: ref('dim_zone'), field: zone_id}
      - name: dropoff_location_id
        data_tests:
          - relationships:
              arguments: {to: ref('dim_zone'), field: zone_id}
